<div class="user-dropdown" id="userDropdown">
    {% if session['role'] == 1%}
        {% if session['is_admin'] == 1%}
            <a href="{{ url_for('user.home') }}">Go to User</a>
        {% else %}
            <a href="{{ url_for('admin.dashboard') }}">Go to admin</a>
        {% endif %}
    {% endif%}
    <a href="{{ url_for('auth.logout') }}">Log out</a>
</div>
