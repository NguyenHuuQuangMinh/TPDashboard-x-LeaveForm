<div class="route-actions">
<form id="dpmForm" method="POST" action="{{ url_for('departments.create_dpm') }}">

    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-grid">

        <div class="form-group">

            <label>Name</label>

            <input type="text" name="name" required>

        </div>

        <div class="form-group">

            <label>Status</label>

            <input
                type="text"
                value="Active"
                readonly
            >

            <input
                type="hidden"
                name="status"
                value="1"
            >

        </div>

    </div>


    </form>
    <div class="crud-actions">

            <button
                class="btn-save"
                type="submit"
                form="dpmForm"
            >
                Create
            </button>

            <button
                class="btn-back crud-overlay"
                type="button"
                data-crud-close
            >
                Back
            </button>

        </div>

    </div>
