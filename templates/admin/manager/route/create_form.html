<div class="route-actions">
<form id="routeForm" method="POST" action="{{ url_for('routes.create_route') }}">

    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-grid">

        <div class="form-group">

            <label>Name</label>

            <input type="text" id="routeName" name="route_name" required>

        </div>

        <div class="form-group">

            <label>Window Type</label>

            <select id="windowType" name="window_type">

                <option value="admin" >
                    Admin
                </option>

                <option value="user" >
                    User
                </option>

            </select>

        </div>

    </div>

    <div class="form-grid">

        <div class="form-group">

            <label>Path</label>

            <input type="text" id="routePath" name="route_path">

        </div>

        <div class="form-group">

            <label>Icon</label>

            <div class="icon-input">

                <i id="iconPreview" class="bi bi-circle"></i>

                <input type="text" id="routeIcon" name="icon" >

            </div>

        </div>

    </div>

    <div class="form-grid">

        <div class="form-group">

            <label>Sort Order</label>

            <input type="number" id="sortOrder" name="sort_order" required>

        </div>

        <div class="form-group">

            <label>Status</label>

            <select id="isActive" name="is_active">

                <option value="true" >
                    Active
                </option>

                <option
                    value="false">
                    Inactive
                </option>

            </select>

        </div>

    </div>


        <div class="form-group">

            <label>Parent</label>

            <select name="parent_id" id="parentId">

                <option value="0">
                    -- No Parent --
                </option>

                {% for p in parents %}

                    <option value="{{ p.id }}">
                        {{ p.name }} ({{ p.window_type }})
                    </option>

                {% endfor %}

            </select>

        </div>

    </form>
    <div class="crud-actions">

            <button
                class="btn-save"
                type="submit"
                form="routeForm"
            >
                Create
            </button>

            <button
                class="btn-back"
                type="button"
                data-crud-close
            >
                Back
            </button>

        </div>

    </div>
